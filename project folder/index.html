<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Choice Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <body>
        <div class="game">
            <h1>Eco Choice Game</h1>
        
            <div id="ui">
                <div class="bar">
                    <label>Pollution</label>
                    <div class="meter">
                        <div id="pollutionFill"></div>
                    </div>
                </div>
        
                <div class="bar">
                    <label>Energy</label>
                    <div class="meter">
                        <div id="energyFill"></div>
                    </div>
                </div>
            </div>
        
            <div id="inventory">Inventory: Empty</div>
        
            <div id="story"></div>
            <div id="choices"></div>
        </div>
<script src="script.js"></script>
</body>
</html>
